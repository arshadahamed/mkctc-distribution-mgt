<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Lost in the Fields | MKC Trade Center</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --primary: #2e7d32;
            --primary-light: #4caf50;
            --primary-dark: #1b5e20;
            --secondary: #8bc34a;
            --bg-dark: #0f172a;
            --text-glow: rgba(76, 175, 80, 0.4);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            perspective: 1000px;
            color: #fff;
        }

        /* Animated 3D Background Objects */
        .ambient-bg {
            position: fixed;
            inset: 0;
            z-index: -1;
            overflow: hidden;
        }

        .floating-object {
            position: absolute;
            background: linear-gradient(135deg, rgba(46, 125, 50, 0.1), rgba(139, 195, 74, 0.05));
            border-radius: 30% 70% 70% 30% / 30% 30% 70% 70%;
            filter: blur(40px);
            animation: rotate-blob 20s infinite linear;
        }

        .blob-1 {
            width: 400px;
            height: 400px;
            top: -100px;
            left: -100px;
            animation-duration: 25s;
        }

        .blob-2 {
            width: 300px;
            height: 300px;
            bottom: -50px;
            right: -50px;
            animation-duration: 18s;
            animation-direction: reverse;
        }

        @keyframes rotate-blob {
            from {
                transform: rotate(0deg) scale(1) translate(0, 0);
            }

            50% {
                transform: rotate(180deg) scale(1.2) translate(50px, 50px);
            }

            to {
                transform: rotate(360deg) scale(1) translate(0, 0);
            }
        }

        .scene-3d {
            transform-style: preserve-3d;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            animation: scene-float 5s ease-in-out infinite;
        }

        @keyframes scene-float {

            0%,
            100% {
                transform: translateY(0) rotateX(5deg);
            }

            50% {
                transform: translateY(-20px) rotateX(-5deg);
            }
        }

        /* 3D 404 Text */
        .error-code {
            position: relative;
            font-size: 180px;
            font-weight: 900;
            line-height: 1;
            letter-spacing: -5px;
            color: #fff;
            transform-style: preserve-3d;
            margin-bottom: 2rem;
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        .error-code::before {
            content: '404';
            position: absolute;
            top: 10px;
            left: 10px;
            color: var(--primary-dark);
            transform: translateZ(-20px);
            filter: blur(2px);
            opacity: 0.5;
        }

        .error-code span {
            display: inline-block;
            background: linear-gradient(180deg, #fff 0%, #a5d6a7 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
            animation: letter-wiggle 3s ease-in-out infinite;
        }

        .error-code span:nth-child(2) {
            animation-delay: 0.2s;
        }

        .error-code span:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes letter-wiggle {

            0%,
            100% {
                transform: translateZ(20px) rotateY(0deg);
            }

            50% {
                transform: translateZ(50px) rotateY(15deg);
            }
        }

        .content-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 3rem;
            border-radius: 32px;
            text-align: center;
            max-width: 500px;
            width: 90%;
            transform: translateZ(30px);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.4);
        }

        h2 {
            font-size: 2rem;
            font-weight: 800;
            margin-bottom: 1rem;
            background: linear-gradient(to right, #fff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            color: #94a3b8;
            margin-bottom: 2.5rem;
            font-size: 1.1rem;
            line-height: 1.6;
        }

        .btns {
            display: flex;
            gap: 1rem;
            justify-content: center;
        }

        .btn {
            padding: 1rem 2rem;
            border-radius: 16px;
            text-decoration: none;
            font-weight: 700;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
            box-shadow: 0 10px 25px rgba(46, 125, 50, 0.4);
        }

        .btn-primary:hover {
            transform: translateY(-5px) scale(1.05);
            background: var(--primary-light);
            box-shadow: 0 15px 35px rgba(46, 125, 50, 0.6);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.05);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-5px);
        }

        /* Floating icons with 3D depth */
        .float-icons {
            position: absolute;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .float-icon {
            position: absolute;
            color: rgba(76, 175, 80, 0.15);
            animation: icon-float 10s infinite ease-in-out;
            transform-style: preserve-3d;
        }

        @keyframes icon-float {

            0%,
            100% {
                transform: translate(0, 0) rotate(0deg) translateZ(10px);
            }

            33% {
                transform: translate(30px, -50px) rotate(120deg) translateZ(60px);
            }

            66% {
                transform: translate(-20px, 40px) rotate(240deg) translateZ(-30px);
            }
        }

        .icon-1 {
            top: 15%;
            left: 10%;
            font-size: 80px;
            animation-duration: 12s;
        }

        .icon-2 {
            bottom: 20%;
            right: 15%;
            font-size: 120px;
            animation-duration: 15s;
        }

        .icon-3 {
            top: 60%;
            left: 12%;
            font-size: 40px;
            animation-duration: 9s;
        }

        .icon-4 {
            top: 25%;
            right: 10%;
            font-size: 60px;
            animation-duration: 11s;
        }
    </style>
</head>

<body>
    <div class="ambient-bg">
        <div class="floating-object blob-1"></div>
        <div class="floating-object blob-2"></div>
    </div>

    <div class="float-icons">
        <i class="fas fa-seedling float-icon icon-1"></i>
        <i class="fas fa-leaf float-icon icon-2"></i>
        <i class="fas fa-tractor float-icon icon-3"></i>
        <i class="fas fa-box-open float-icon icon-4"></i>
    </div>

    <div class="scene-3d">
        <div class="error-code" id="error-text">
            <span>4</span><span>0</span><span>4</span>
        </div>

        <div class="content-card">
            <h2>Lost in the Fields?</h2>
            <p>The page you're harvesting doesn't seem to exist. It might have withered away or moved to a different
                plot.</p>

            <div class="btns">
                <a href="/" class="btn btn-primary">
                    <i class="fas fa-home"></i> Back to Home
                </a>
                <a href="/login" class="btn btn-secondary">
                    <i class="fas fa-user-lock"></i> Client Portal
                </a>
            </div>
        </div>
    </div>

    <script>
        const scene = document.querySelector('.scene-3d');
        const errorText = document.getElementById('error-text');

        document.addEventListener('mousemove', (e) => {
            const x = (window.innerWidth / 2 - e.pageX) / 25;
            const y = (window.innerHeight / 2 - e.pageY) / 25;

            scene.style.transform = `rotateY(${x}deg) rotateX(${y}deg)`;

            // Subtle offset for the text shadow depth
            errorText.style.textShadow = `${x}px ${y}px 20px rgba(76, 175, 80, 0.3)`;
        });

        // Add touch support for mobile
        document.addEventListener('touchmove', (e) => {
            const touch = e.touches[0];
            const x = (window.innerWidth / 2 - touch.pageX) / 25;
            const y = (window.innerHeight / 2 - touch.pageY) / 25;
            scene.style.transform = `rotateY(${x}deg) rotateX(${y}deg)`;
        });
    </script>
</body>

</html>
