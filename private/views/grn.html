<div id="grn-view" class="view-content" style="display: none;">
    <div class="card">
        <div class="card-header">
            <div style="display: flex; gap: var(--spacing-md); align-items: center;">
                <h3 class="card-title">Goods Received Notes (GRN)</h3>
                <input type="text" id="grn-search" placeholder="Search GRN # or Supplier..." class="form-control"
                    style="width: 300px; margin-bottom: 0;" onkeyup="app.loadGrnData()">
                <div style="display: flex; align-items: center; gap: 10px;">
                    <input type="date" id="grn-date-from" class="form-control" style="width: 140px; margin-bottom: 0;"
                        onchange="app.loadGrnData()">
                    <span style="color: var(--gray-500);">to</span>
                    <input type="date" id="grn-date-to" class="form-control" style="width: 140px; margin-bottom: 0;"
                        onchange="app.loadGrnData()">
                </div>
            </div>
            <button class="btn btn-primary" id="add-grn-btn" onclick="app.openGrnModal()">
                <i class="fas fa-plus"></i> New GRN
            </button>
        </div>
        <div class="table-container">
            <table class="data-table">
                <thead>
                    <tr>
                        <th>GRN #</th>
                        <th>Date</th>
                        <th>Supplier</th>
                        <th>Reference</th>
                        <th>Items</th>
                        <th>Total Amount</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="grn-table-body">
                    <tr>
                        <td colspan="8" class="text-center" style="padding: 2rem; color: var(--gray-500);">
                            No GRN records found.
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
        <!-- Pagination Controls -->
        <div class="pagination-container" id="grn-pagination">
            <div class="pagination-info">
                Showing <span id="grn-page-start">0</span>-<span id="grn-page-end">0</span> of
                <span id="grn-total">0</span> records
            </div>
            <div class="pagination-controls">
                <button class="btn btn-secondary btn-sm" id="grn-prev-btn" onclick="app.changeGrnPage(-1)" disabled>
                    <i class="fas fa-chevron-left"></i> Previous
                </button>
                <div class="pagination-pages" id="grn-pages"></div>
                <button class="btn btn-secondary btn-sm" id="grn-next-btn" onclick="app.changeGrnPage(1)" disabled>
                    Next <i class="fas fa-chevron-right"></i>
                </button>
            </div>
            <div class="pagination-limit">
                <label>Per page:</label>
                <select id="grn-limit" class="form-control" style="width: 80px; margin-bottom: 0;"
                    onchange="app.loadGrnData()">
                    <option value="10">10</option>
                    <option value="20" selected>20</option>
                    <option value="50">50</option>
                </select>
            </div>
        </div>
    </div>
</div>
