<div id="rma-view" class="view-content" style="display: none;">
                <div class="card">
                    <div class="card-header">
                        <div style="display: flex; gap: var(--spacing-md); align-items: center;">
                            <h3 class="card-title">Damage & Returns Management (RMA)</h3>
                            <div class="tab-pills" style="margin-left: 20px;">
                                <button class="pill active" id="rma-tab-requests"
                                    onclick="app.switchRmaTab('requests')">Return Requests</button>
                                <button class="pill" id="rma-tab-ledger" onclick="app.switchRmaTab('ledger')">Damaged
                                    Stock Ledger</button>
                            </div>
                        </div>
                        <button class="btn btn-primary" id="btn-new-rma" onclick="app.openRmaModal()">
                            <i class="fas fa-undo"></i> New RMA Request
                        </button>
                    </div>

                    <div id="rma-requests-container">
                        <!-- Standard RMA Filters & Table -->
                        <div class="card-body" style="padding: 15px; border-bottom: 1px solid #eee;">
                            <div style="display: flex; gap: 15px; align-items: center; flex-wrap: wrap;">
                                <div style="display: flex; align-items: center; gap: 8px;">
                                    <i class="fas fa-search" style="color: var(--gray-400);"></i>
                                    <input type="text" id="rma-search" class="form-control"
                                        style="width: 250px; margin:0;" placeholder="Search RMA # or Customer..."
                                        onkeyup="app.loadRmaData()">
                                </div>
                                <div style="display: flex; align-items: center; gap: 8px;">
                                    <span style="font-size: 0.85rem; color: var(--gray-600);">Status:</span>
                                    <select id="rma-status-filter" class="form-control" style="width: 150px; margin:0;"
                                        onchange="app.loadRmaData()">
                                        <option value="">All Statuses</option>
                                        <option value="pending">Pending</option>
                                        <option value="inspected">Inspected</option>
                                        <option value="approved">Approved</option>
                                        <option value="completed">Completed</option>
                                        <option value="rejected">Rejected</option>
                                    </select>
                                </div>
                                <button class="btn btn-secondary btn-sm" onclick="app.resetRmaFilters()">
                                    <i class="fas fa-sync"></i> Refresh
                                </button>
                            </div>
                        </div>
                        <div class="table-container">
                            <table class="data-table" id="rma-table">
                                <thead>
                                    <tr>
                                        <th>RMA #</th>
                                        <th>Date</th>
                                        <th>Customer</th>
                                        <th>Total Value</th>
                                        <th>Status</th>
                                        <th>Handled By</th>
                                        <th style="text-align: right;">Actions</th>
                                    </tr>
                                </thead>
                                <tbody id="rma-table-body">
                                    <!-- ROI data loaded via JS -->
                                </tbody>
                            </table>
                        </div>
                    </div>

                    <div id="rma-ledger-container" style="display: none;">
                        <div class="card-body"
                            style="padding: 15px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center;">
                            <div style="color: var(--gray-600); font-size: 0.9rem;">
                                <i class="fas fa-info-circle"></i> Showing historical damage and scrap logs from RMAs.
                            </div>
                            <button class="btn btn-secondary btn-sm" onclick="app.loadRmaLedger()">
                                <i class="fas fa-sync"></i> Refresh Ledger
                            </button>
                        </div>
                        <div class="table-container">
                            <table class="data-table">
                                <thead>
                                    <tr>
                                        <th>Date</th>
                                        <th>Product</th>
                                        <th>Qty</th>
                                        <th>Type</th>
                                        <th>Reason/Source</th>
                                        <th>Remarks</th>
                                    </tr>
                                </thead>
                                <tbody id="rma-ledger-body">
                                    <!-- Ledger data -->
                                </tbody>
                            </table>
                        </div>
                    </div>

                </div>
            </div>
